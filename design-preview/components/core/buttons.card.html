<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--color-bg); }
  .grid { display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .cap { font: var(--fw-bold) 10px/1 var(--font-sans); letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); width: 100%; }
</style></head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, IconButton } = window.FrenchThermic_dd06d0;
    const Ico = ({ name, size = 18 }) => {
      const ref = React.useRef(null);
      React.useEffect(() => { if (ref.current) { ref.current.innerHTML = ''; const el = window.lucide.createElement(window.lucide[name]); el.setAttribute('width', size); el.setAttribute('height', size); ref.current.appendChild(el); } }, []);
      return <span ref={ref} style={{ display: 'inline-flex' }} />;
    };
    function Demo() {
      return (
        <div className="grid">
          <div className="row"><span className="cap">Variants</span>
            <Button variant="primary">Demander un devis</Button>
            <Button variant="accent" iconRight={<Ico name="ArrowRight" />}>Prendre rendez-vous</Button>
            <Button variant="secondary">En savoir plus</Button>
            <Button variant="ghost">Annuler</Button>
          </div>
          <div className="row"><span className="cap">Sizes</span>
            <Button size="sm">Small</Button>
            <Button size="md">Medium</Button>
            <Button size="lg">Large</Button>
            <Button disabled>Disabled</Button>
          </div>
          <div className="row"><span className="cap">Icon buttons</span>
            <IconButton variant="primary" aria-label="Appeler"><Ico name="Phone" /></IconButton>
            <IconButton variant="accent" round aria-label="Calendrier"><Ico name="CalendarDays" /></IconButton>
            <IconButton variant="secondary" aria-label="Menu"><Ico name="Menu" /></IconButton>
            <IconButton variant="ghost" aria-label="Plus"><Ico name="Plus" /></IconButton>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body></html>
