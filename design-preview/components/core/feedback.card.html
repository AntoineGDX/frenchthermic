<!-- @dsCard group="Components" viewport="700x340" name="Badges, Cards & Inputs" subtitle="Status pills, elevated surfaces, form fields" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--color-bg); }
  .wrap { display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
  .cap { font: var(--fw-bold) 10px/1 var(--font-sans); letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); width: 100%; }
  h3 { font: var(--fw-bold) 18px/1.2 var(--font-display); color: var(--text-strong); margin: 0 0 6px; }
  .cbody { font: var(--fw-regular) 14px/1.5 var(--font-sans); color: var(--text-body); margin: 0; }
</style></head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Badge, Card, Input } = window.FrenchThermic_dd06d0;
    const Ico = ({ name, size = 18 }) => {
      const ref = React.useRef(null);
      React.useEffect(() => { if (ref.current) { ref.current.innerHTML = ''; const el = window.lucide.createElement(window.lucide[name]); el.setAttribute('width', size); el.setAttribute('height', size); ref.current.appendChild(el); } }, []);
      return <span ref={ref} style={{ display: 'inline-flex' }} />;
    };
    function Demo() {
      return (
        <div className="wrap">
          <div className="row"><span className="cap">Badges</span>
            <Badge variant="teal">Expertise</Badge>
            <Badge variant="accent">Nouveau</Badge>
            <Badge variant="success" dot>Disponible</Badge>
            <Badge variant="warning">En attente</Badge>
            <Badge variant="danger">Urgent</Badge>
            <Badge variant="solid">Certifié RGE</Badge>
          </div>
          <div className="cols">
            <Card accent hoverable>
              <h3>Audit énergétique</h3>
              <p className="cbody">Évaluez la performance de votre logement et identifiez les travaux prioritaires.</p>
            </Card>
            <Input label="Email" type="email" placeholder="vous@exemple.fr" iconLeft={<Ico name="Mail" size={16} />} helper="Nous vous répondons sous 24h." />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body></html>
