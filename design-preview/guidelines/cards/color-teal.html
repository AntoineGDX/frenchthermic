<!-- @dsCard group="Colors" viewport="700x150" name="Primary · Teal" subtitle="Brand core #125C5E and its scale" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; }
  .sw span { font: var(--fw-semibold) 11px/1.3 var(--font-sans); }
  .sw small { font: var(--fw-medium) 10px/1.4 var(--font-sans); opacity: 0.8; }
  .light { color: rgba(255,255,255,0.92); }
  .dark { color: var(--neutral-900); }
  .core { outline: 3px solid var(--terracotta-500); outline-offset: -3px; }
</style></head>
<body>
  <div class="row">
    <div class="sw dark" style="background:var(--teal-50)"><span>50</span><small>#eef6f5</small></div>
    <div class="sw dark" style="background:var(--teal-100)"><span>100</span></div>
    <div class="sw dark" style="background:var(--teal-200)"><span>200</span></div>
    <div class="sw dark" style="background:var(--teal-300)"><span>300</span></div>
    <div class="sw light" style="background:var(--teal-400)"><span>400</span></div>
    <div class="sw light" style="background:var(--teal-500)"><span>500</span></div>
    <div class="sw light core" style="background:var(--teal-700)"><span>700 · core</span><small>#125c5e</small></div>
    <div class="sw light" style="background:var(--teal-800)"><span>800</span></div>
    <div class="sw light" style="background:var(--teal-900)"><span>900</span></div>
  </div>
</body></html>
