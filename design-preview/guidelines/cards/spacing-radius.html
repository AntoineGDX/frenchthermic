<!-- @dsCard group="Spacing" viewport="700x160" name="Radius" subtitle="Soft corners echoing the logo's rounded terminals" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px 26px; display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  .c { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 78px; height: 78px; background: var(--teal-100); border: 2px solid var(--color-primary); }
  .lbl { font: var(--fw-semibold) 11px/1 var(--font-sans); color: var(--text-muted); }
</style></head>
<body>
  <div class="c"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="lbl">xs · 4</span></div>
  <div class="c"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lbl">sm · 8</span></div>
  <div class="c"><div class="box" style="border-radius:var(--radius-md)"></div><span class="lbl">md · 12</span></div>
  <div class="c"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lbl">lg · 18</span></div>
  <div class="c"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="lbl">xl · 28</span></div>
  <div class="c"><div class="box" style="border-radius:var(--radius-pill)"></div><span class="lbl">pill</span></div>
</body></html>
