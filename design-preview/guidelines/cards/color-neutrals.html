<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Warm, faintly teal-tinted grays for text & surfaces" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
  .sw { flex: 1; height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; }
  .sw span { font: var(--fw-semibold) 11px/1.3 var(--font-sans); }
  .light { color: rgba(255,255,255,0.92); }
  .dark { color: var(--neutral-800); }
</style></head>
<body>
  <div class="row">
    <div class="sw dark" style="background:var(--neutral-0)"><span>0</span></div>
    <div class="sw dark" style="background:var(--neutral-50)"><span>50</span></div>
    <div class="sw dark" style="background:var(--neutral-100)"><span>100</span></div>
    <div class="sw dark" style="background:var(--neutral-200)"><span>200</span></div>
    <div class="sw dark" style="background:var(--neutral-300)"><span>300</span></div>
    <div class="sw dark" style="background:var(--neutral-400)"><span>400</span></div>
    <div class="sw light" style="background:var(--neutral-500)"><span>500</span></div>
    <div class="sw light" style="background:var(--neutral-600)"><span>600</span></div>
    <div class="sw light" style="background:var(--neutral-700)"><span>700</span></div>
    <div class="sw light" style="background:var(--neutral-800)"><span>800</span></div>
    <div class="sw light" style="background:var(--neutral-900)"><span>900</span></div>
  </div>
</body></html>
