<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px 32px; display: flex; align-items: center; gap: 28px; }
  .tile { display: flex; align-items: center; justify-content: center; border-radius: var(--radius-lg); }
  .light { background: var(--neutral-50); border: 1px solid var(--border); }
  .dark { background: var(--color-surface-dark); }
  .accent { background: var(--color-accent); }
  .tile img { height: 96px; }
  .lbl { font: var(--fw-semibold) 11px/1.3 var(--font-sans); color: var(--text-muted); }
  .c { display: flex; flex-direction: column; align-items: center; gap: 10px; }
</style></head>
<body>
  <div class="c"><div class="tile light" style="width:140px;height:140px"><img src="../../assets/logo/frenchthermic-mark.png" alt="FF"></div><span class="lbl">On light</span></div>
  <div class="c"><div class="tile dark" style="width:140px;height:140px"><img src="../../assets/logo/frenchthermic-mark-white.png" alt="FF"></div><span class="lbl">On dark</span></div>
</body></html>
