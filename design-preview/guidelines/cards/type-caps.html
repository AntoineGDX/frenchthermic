<!-- @dsCard group="Type" viewport="700x150" name="Caps & eyebrows" subtitle="Wide-tracked all-caps labels, lifted from the wordmark" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 26px; display: flex; flex-direction: column; gap: 18px; }
  .eyebrow { font: var(--fw-bold) 13px/1 var(--font-display); letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--color-accent); }
  .word { font: var(--fw-extra) 30px/1 var(--font-display); letter-spacing: 0.14em; text-transform: uppercase; color: var(--color-primary); }
  .small { font: var(--fw-semibold) 11px/1 var(--font-sans); letter-spacing: var(--tracking-wide); text-transform: uppercase; color: var(--text-muted); }
</style></head>
<body>
  <span class="eyebrow">Expertise thermique</span>
  <span class="word">French Thermic</span>
  <span class="small">Audit · DPE · Conseil technique</span>
</body></html>
