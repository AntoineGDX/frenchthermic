<!-- @dsCard group="Spacing" viewport="700x170" name="Shadows" subtitle="Soft, cool teal-tinted elevation" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 28px 26px; display: flex; align-items: center; gap: 26px; flex-wrap: wrap; background: var(--neutral-50); }
  .c { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 92px; height: 64px; background: var(--color-surface); border-radius: var(--radius-md); }
  .lbl { font: var(--fw-semibold) 11px/1 var(--font-sans); color: var(--text-muted); }
</style></head>
<body>
  <div class="c"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="lbl">xs</span></div>
  <div class="c"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="lbl">sm</span></div>
  <div class="c"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="lbl">md</span></div>
  <div class="c"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="lbl">lg</span></div>
  <div class="c"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="lbl">xl</span></div>
</body></html>
