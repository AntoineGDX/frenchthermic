<!-- @dsCard group="Colors" viewport="700x150" name="Accent · Terracotta" subtitle="Warm accent #DE865C — the orange square in the mark" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; }
  .sw span { font: var(--fw-semibold) 11px/1.3 var(--font-sans); }
  .sw small { font: var(--fw-medium) 10px/1.4 var(--font-sans); opacity: 0.85; }
  .light { color: #fff; }
  .dark { color: var(--neutral-900); }
  .core { outline: 3px solid var(--teal-700); outline-offset: -3px; }
</style></head>
<body>
  <div class="row">
    <div class="sw dark" style="background:var(--terracotta-50)"><span>50</span><small>#fdf5f0</small></div>
    <div class="sw dark" style="background:var(--terracotta-100)"><span>100</span></div>
    <div class="sw dark" style="background:var(--terracotta-200)"><span>200</span></div>
    <div class="sw dark" style="background:var(--terracotta-300)"><span>300</span></div>
    <div class="sw dark" style="background:var(--terracotta-400)"><span>400</span></div>
    <div class="sw dark core" style="background:var(--terracotta-500)"><span>500 · core</span><small>#de865c</small></div>
    <div class="sw light" style="background:var(--terracotta-600)"><span>600</span></div>
    <div class="sw light" style="background:var(--terracotta-700)"><span>700</span></div>
    <div class="sw light" style="background:var(--terracotta-800)"><span>800</span></div>
  </div>
</body></html>
