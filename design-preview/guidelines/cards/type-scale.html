<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 18px 26px; }
  .r { display: flex; align-items: baseline; gap: 18px; border-bottom: 1px solid var(--border); padding: 7px 0; }
  .r:last-child { border-bottom: 0; }
  .s { font-family: var(--font-display); font-weight: var(--fw-bold); color: var(--text-strong); letter-spacing: var(--tracking-tight); white-space: nowrap; }
  .t { font: var(--fw-semibold) 11px/1 var(--font-sans); color: var(--text-muted); margin-left: auto; }
</style></head>
<body>
  <div class="r"><span class="s" style="font-size:var(--text-3xl)">Confort thermique</span><span class="t">3xl · 46</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-2xl)">Confort thermique</span><span class="t">2xl · 36</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-xl)">Confort thermique</span><span class="t">xl · 28</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-lg)">Confort thermique</span><span class="t">lg · 22</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-md)">Confort thermique</span><span class="t">md · 18</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-base);font-family:var(--font-sans)">Confort thermique</span><span class="t">base · 16</span></div>
  <div class="r"><span class="s" style="font-size:var(--text-sm);font-family:var(--font-sans)">Confort thermique</span><span class="t">sm · 14</span></div>
</body></html>
